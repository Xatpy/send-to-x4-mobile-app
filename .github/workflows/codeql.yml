name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 9 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  skip-private:
    name: Skip On Private Repo
    if: ${{ github.event.repository.private }}
    runs-on: ubuntu-latest
    steps:
      - name: Explain skip
        run: echo "Skipping CodeQL because GitHub code scanning is not enabled for this private repository. The workflow will run automatically after the repository is public and code scanning is available."

  analyze:
    name: Analyze
    if: ${{ !github.event.repository.private }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]

    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3
